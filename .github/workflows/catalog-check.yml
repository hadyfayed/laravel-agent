name: catalog-check
on:
  push: { branches: ['**'] }
  pull_request:
jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Unit tests
        run: node --test scripts/build-catalog.test.mjs
      - name: Catalog & counts up to date
        run: node scripts/build-catalog.mjs --check
